name: Build Installers

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        working-directory: stardust
        run: |
          cmake -B build -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release .
          cmake --build build --config Release -j$(sysctl -n hw.ncpu)

      - name: Package Installer
        working-directory: stardust
        run: bash installer/build-macos-installer.sh

      - name: Upload macOS Installer
        uses: actions/upload-artifact@v4
        with:
          name: Stardust-macOS-Installer
          path: stardust/build/Stardust-Installer.pkg

      - name: Upload macOS VST3
        uses: actions/upload-artifact@v4
        with:
          name: Stardust-macOS-VST3
          path: stardust/build/Stardust_artefacts/Release/VST3/Stardust.vst3

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        working-directory: stardust
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 .

      - name: Build
        working-directory: stardust
        run: cmake --build build --config Release

      - name: Upload Windows VST3
        uses: actions/upload-artifact@v4
        with:
          name: Stardust-Windows-VST3
          path: stardust/build/Stardust_artefacts/Release/VST3/Stardust.vst3

      - name: Upload Windows Standalone
        uses: actions/upload-artifact@v4
        with:
          name: Stardust-Windows-Standalone
          path: stardust/build/Stardust_artefacts/Release/Standalone/Stardust.exe

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows Installer
        working-directory: stardust
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\Stardust-installer.iss

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: Stardust-Windows-Installer
          path: stardust/build/Stardust-Setup-*.exe
